openapi: 3.1.0
info:
  title: Minutriporcion Patient Mobile API
  description: Patient-facing JSON API under /rest/mobile/patient/**. Requires Auth0
    Bearer JWT (resource server).
  contact:
    name: Minutriporcion
    url: https://minutriporcion.com
  version: "1.0"
servers:
- url: http://localhost
  description: Generated server url
security:
- bearer-jwt: []
tags:
- name: Mobile
  description: Patient mobile API
- name: Mobile Invitations
  description: Nutritionist-initiated patient onboarding
paths:
  /rest/mobile/patient/messages:
    get:
      tags:
      - Mobile
      summary: List messages
      description: Returns cursor-paged messages for the authenticated patient.
      operationId: listMessages
      parameters:
      - name: cursor
        in: query
        description: Opaque cursor from a previous page
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: Page size
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: Cursor-paged message summaries
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseCursorPagedResponsePatientMessageSummaryDto"
        "401":
          description: Missing or invalid JWT
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseCursorPagedResponsePatientMessageSummaryDto"
        "403":
          description: Patient account not linked to Auth0 sub
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseCursorPagedResponsePatientMessageSummaryDto"
    post:
      tags:
      - Mobile
      summary: Send message
      description: Creates a patient-to-nutritionist message.
      operationId: sendMessage
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendPatientMessageRequest"
        required: true
      responses:
        "201":
          description: Created message summary
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientMessageSummaryDto"
        "401":
          description: Missing or invalid JWT
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientMessageSummaryDto"
        "403":
          description: Patient account not linked to Auth0 sub
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientMessageSummaryDto"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientMessageSummaryDto"
        "429":
          description: "Rate limit exceeded (Retry-After: 60)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientMessageSummaryDto"
  /rest/mobile/invitations:
    post:
      tags:
      - Mobile Invitations
      summary: Create patient invitation
      description: Nutritionist JWT creates Paciente (INVITED) + pending invitation;
        returns deep link and human code.
      operationId: createInvitation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientInvitationRequest"
        required: true
      responses:
        "201":
          description: Patient and invitation created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseCreatedPatientInvitationDto"
        "401":
          description: Missing or invalid JWT
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseCreatedPatientInvitationDto"
        "403":
          description: Subscription limit or entitlement denied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseCreatedPatientInvitationDto"
  /rest/mobile/invitations/{token}/redeem:
    post:
      tags:
      - Mobile Invitations
      summary: Redeem patient invitation
      description: Patient JWT binds Auth0 sub to pre-created Paciente; authoritative
        onboarding gate.
      operationId: redeemInvitation
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Invitation redeemed or idempotent retry by same sub
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRedeemedPatientInvitationDto"
        "401":
          description: Missing or invalid JWT
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRedeemedPatientInvitationDto"
        "400":
          description: Malformed invitation token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRedeemedPatientInvitationDto"
        "404":
          description: Invalid or expired invitation
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRedeemedPatientInvitationDto"
        "409":
          description: Invitation already redeemed by another account
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRedeemedPatientInvitationDto"
        "422":
          description: Patient not in INVITED status
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRedeemedPatientInvitationDto"
        "429":
          description: "Rate limit exceeded (Retry-After: 60)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRedeemedPatientInvitationDto"
  /rest/mobile/patient/me:
    get:
      tags:
      - Mobile
      summary: Get onboarding profile
      description: Returns patient bootstrap profile and optional assigned diet plan
        reference.
      operationId: getProfile
      responses:
        "200":
          description: Onboarding profile
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientOnboardingProfileDto"
        "401":
          description: Missing or invalid JWT
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientOnboardingProfileDto"
        "403":
          description: Patient account not linked to Auth0 sub
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientOnboardingProfileDto"
    patch:
      tags:
      - Mobile
      summary: Update onboarding profile
      description: Patches onboarding fields; transitions status to ACTIVE when all
        required fields are present.
      operationId: updateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchPatientOnboardingProfileRequest"
        required: true
      responses:
        "200":
          description: Updated onboarding profile
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientOnboardingProfileDto"
        "401":
          description: Missing or invalid JWT
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientOnboardingProfileDto"
        "403":
          description: Patient account not linked to Auth0 sub
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientOnboardingProfileDto"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientOnboardingProfileDto"
        "429":
          description: "Rate limit exceeded (Retry-After: 60)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientOnboardingProfileDto"
  /rest/mobile/patient/visits:
    get:
      tags:
      - Mobile
      summary: List patient visits
      description: Returns a paged list of visit summaries for the authenticated patient.
      operationId: listVisits
      parameters:
      - name: page
        in: query
        description: Zero-based page index
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        description: Page size
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      - name: status
        in: query
        description: Filter by visit status
        required: false
        schema:
          type: string
          enum:
          - SCHEDULED
          - COMPLETED
          - CANCELLED
      - name: from
        in: query
        description: Inclusive start instant (ISO-8601)
        required: false
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        description: Inclusive end instant (ISO-8601)
        required: false
        schema:
          type: string
          format: date-time
      responses:
        "200":
          description: Paged visit summaries
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePagedResponseVisitSummaryDto"
        "401":
          description: Missing or invalid JWT
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePagedResponseVisitSummaryDto"
        "403":
          description: Patient account not linked to Auth0 sub
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePagedResponseVisitSummaryDto"
  /rest/mobile/patient/visits/{visitId}:
    get:
      tags:
      - Mobile
      summary: Get visit detail
      description: Returns a single visit owned by the authenticated patient.
      operationId: getVisitDetail
      parameters:
      - name: visitId
        in: path
        description: Visit identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Visit detail
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVisitDetailDto"
        "401":
          description: Missing or invalid JWT
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVisitDetailDto"
        "403":
          description: Patient account not linked to Auth0 sub
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVisitDetailDto"
        "404":
          description: Resource not found or not owned by patient
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVisitDetailDto"
  /rest/mobile/patient/progress:
    get:
      tags:
      - Mobile
      summary: Get progress snapshot
      description: Returns latest BMI/BMR and related progress snapshot for the patient.
      operationId: getProgress
      responses:
        "200":
          description: Progress snapshot
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientProgressSnapshotDto"
        "401":
          description: Missing or invalid JWT
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientProgressSnapshotDto"
        "403":
          description: Patient account not linked to Auth0 sub
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientProgressSnapshotDto"
  /rest/mobile/patient/progress/measurements:
    get:
      tags:
      - Mobile
      summary: List progress measurements
      description: Returns anthropometric measurement time series for the patient.
      operationId: listMeasurements
      parameters:
      - name: from
        in: query
        description: Inclusive start instant (ISO-8601)
        required: false
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        description: Inclusive end instant (ISO-8601)
        required: false
        schema:
          type: string
          format: date-time
      - name: maxRows
        in: query
        description: Maximum rows (capped at 365)
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: "Measurement time series (ASC, max 365 rows)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProgressMeasurementsDto"
        "400":
          description: Invalid date range (from after to)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProgressMeasurementsDto"
        "401":
          description: Missing or invalid JWT
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProgressMeasurementsDto"
        "403":
          description: Patient account not linked to Auth0 sub
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProgressMeasurementsDto"
  /rest/mobile/patient/diet-plans:
    get:
      tags:
      - Mobile
      summary: List diet plans
      description: Returns assigned diet plans for the authenticated patient.
      operationId: listDietPlans
      parameters:
      - name: page
        in: query
        description: Zero-based page index
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        description: Page size
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      - name: activeOnly
        in: query
        description: "When true, return only active assignments"
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: Paged diet plan summaries
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePagedResponseDietPlanSummaryDto"
        "401":
          description: Missing or invalid JWT
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePagedResponseDietPlanSummaryDto"
        "403":
          description: Patient account not linked to Auth0 sub
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePagedResponseDietPlanSummaryDto"
  /rest/mobile/patient/diet-plans/{assignmentId}:
    get:
      tags:
      - Mobile
      summary: Get diet plan detail
      description: Returns structured meal JSON for an assignment owned by the patient.
      operationId: getDietPlanDetail
      parameters:
      - name: assignmentId
        in: path
        description: PacienteDieta assignment identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Diet plan detail with ingestas and platillos
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDietPlanDetailDto"
        "401":
          description: Missing or invalid JWT
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDietPlanDetailDto"
        "403":
          description: Patient account not linked to Auth0 sub
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDietPlanDetailDto"
        "404":
          description: Resource not found or not owned by patient
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDietPlanDetailDto"
  /rest/mobile/patient/diet-plans/{assignmentId}/pdf:
    get:
      tags:
      - Mobile
      summary: Download diet plan PDF
      description: Returns a printable PDF for an assignment owned by the patient.
      operationId: getDietPlanPdf
      parameters:
      - name: assignmentId
        in: path
        description: PacienteDieta assignment identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: PDF bytes
          content:
            application/pdf: {}
        "401":
          description: Missing or invalid JWT
          content:
            application/pdf:
              schema:
                type: string
                format: byte
        "403":
          description: Patient account not linked to Auth0 sub
          content:
            application/pdf:
              schema:
                type: string
                format: byte
        "404":
          description: Resource not found or not owned by patient
          content:
            application/pdf:
              schema:
                type: string
                format: byte
  /rest/mobile/invitations/{token}/preview:
    get:
      tags:
      - Mobile Invitations
      summary: Preview patient invitation
      description: "Public, rate-limited preview returning inviter display name only\
        \ (no patient PII)."
      operationId: previewInvitation
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Invitation preview when token is valid and pending
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientInvitationPreviewDto"
        "400":
          description: Malformed invitation token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientInvitationPreviewDto"
        "404":
          description: Invalid or expired invitation
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientInvitationPreviewDto"
        "429":
          description: "Rate limit exceeded (Retry-After: 60)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePatientInvitationPreviewDto"
      security: []
components:
  schemas:
    SendPatientMessageRequest:
      type: object
      properties:
        body:
          type: string
          description: Message body
          maxLength: 2000
          minLength: 0
      required:
      - body
    ApiResponsePatientMessageSummaryDto:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/PatientMessageSummaryDto"
        message:
          type: string
        timestamp:
          type: string
          format: date-time
    PatientMessageSummaryDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        sentAt:
          type: string
          format: date-time
        senderRole:
          type: string
          enum:
          - PATIENT
          - NUTRITIONIST
        body:
          type: string
        read:
          type: boolean
        senderDisplayName:
          type: string
    CreatePatientInvitationRequest:
      type: object
      description: Create patient + invitation
      properties:
        name:
          type: string
          description: Patient legal/clinical name
          example: María López
          maxLength: 100
          minLength: 0
        email:
          type: string
          description: Delivery email for the invite
          example: maria@example.com
          maxLength: 100
          minLength: 0
        dob:
          type: string
          format: date
          description: Date of birth (ISO-8601 date)
          example: 1990-05-15
        gender:
          type: string
          description: Gender (M/F)
          example: F
          pattern: "(?i)^[MF]$"
        phone:
          type: string
          description: Optional phone
          example: "+525512345678"
          maxLength: 25
          minLength: 0
        assignedId:
          type: string
          description: Optional clinic-facing identifier; auto-generated when omitted
          example: P-CLINIC-001
          maxLength: 50
          minLength: 0
        displayName:
          type: string
          description: Optional display name for onboarding UI
          example: María
          maxLength: 100
          minLength: 0
      required:
      - dob
      - email
      - gender
      - name
    ApiResponseCreatedPatientInvitationDto:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/CreatedPatientInvitationDto"
        message:
          type: string
        timestamp:
          type: string
          format: date-time
    CreatedPatientInvitationDto:
      type: object
      description: Created patient invitation
      properties:
        invitationId:
          type: integer
          format: int64
          description: Invitation row id
          example: 42
        pacienteId:
          type: integer
          format: int64
          description: Created Paciente id
          example: 1001
        inviteUrl:
          type: string
          description: Deep link for the patient app
          example: https://links.example.com/i/abc...
        humanCode:
          type: string
          description: Human-readable onboarding code
          example: NUTRI-ABCD-EFGH
        expiresAt:
          type: string
          format: date-time
          description: Invitation expiry (ISO-8601 instant)
        offlineJws:
          type: string
          description: Optional offline JWS when PATIENT_INVITATION_JWS_SECRET is
            configured
    ApiResponseRedeemedPatientInvitationDto:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/RedeemedPatientInvitationDto"
        message:
          type: string
        timestamp:
          type: string
          format: date-time
    RedeemedPatientInvitationDto:
      type: object
      description: Redeemed patient invitation
      properties:
        pacienteId:
          type: integer
          format: int64
          description: Linked Paciente id
          example: 1001
        pacienteStatus:
          type: string
          description: Patient lifecycle status after redeem
          enum:
          - INVITED
          - ONBOARDING
          - ACTIVE
          - REVOKED
          example: ONBOARDING
        invitationId:
          type: integer
          format: int64
          description: Invitation row id
          example: 42
        redeemedAt:
          type: string
          format: date-time
          description: Redemption timestamp (ISO-8601 instant)
    PatchPatientOnboardingProfileRequest:
      type: object
      description: Patch patient onboarding profile
      properties:
        name:
          type: string
          description: Legal/clinical name
          example: María López
          maxLength: 100
          minLength: 0
        displayName:
          type: string
          description: Display name for mobile UI
          example: María
          maxLength: 100
          minLength: 0
        dob:
          type: string
          format: date
          description: Date of birth (ISO-8601 date)
          example: 1990-05-15
        gender:
          type: string
          description: Gender (M/F)
          example: F
          pattern: "(?i)^[MF]$"
        email:
          type: string
          description: Contact email
          example: maria@example.com
          maxLength: 100
          minLength: 0
        phone:
          type: string
          description: Contact phone
          example: "+525512345678"
          maxLength: 25
          minLength: 0
        avatarId:
          type: string
          description: Avatar id from catalog
          example: avatar_6
          maxLength: 32
          minLength: 0
    ApiResponsePatientOnboardingProfileDto:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/PatientOnboardingProfileDto"
        message:
          type: string
        timestamp:
          type: string
          format: date-time
    AssignedDietPlanReferenceDto:
      type: object
      description: Assigned diet plan reference
      properties:
        assignmentId:
          type: integer
          format: int64
          description: PacienteDieta assignment id
          example: 55
        status:
          type: string
          description: Assignment status
          enum:
          - ACTIVE
          - COMPLETED
          - CANCELLED
          example: ACTIVE
        dietaName:
          type: string
          description: Diet display name
          example: Plan hipocalórico
    PatientOnboardingProfileDto:
      type: object
      description: Patient onboarding profile
      properties:
        pacienteId:
          type: integer
          format: int64
          description: Paciente id
          example: 1001
        status:
          type: string
          description: Lifecycle status
          enum:
          - INVITED
          - ONBOARDING
          - ACTIVE
          - REVOKED
          example: ONBOARDING
        name:
          type: string
          description: Legal/clinical name
          example: María López
        displayName:
          type: string
          description: Display name for mobile UI
          example: María
        dob:
          type: string
          format: date
          description: Date of birth (ISO-8601 date)
          example: 1990-05-15
        gender:
          type: string
          description: Gender (M/F)
          example: F
        email:
          type: string
          description: Contact email
          example: maria@example.com
        phone:
          type: string
          description: Contact phone
          example: "+525512345678"
        avatarId:
          type: string
          description: Selected avatar id
          example: avatar_6
        assignedId:
          type: string
          description: Clinic-facing identifier
          example: P-CLINIC-001
        profileComplete:
          type: boolean
          description: True when all required onboarding fields are present
          example: false
        assignedDietPlan:
          $ref: "#/components/schemas/AssignedDietPlanReferenceDto"
          description: "Primary active diet assignment, when present"
    ApiResponsePagedResponseVisitSummaryDto:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/PagedResponseVisitSummaryDto"
        message:
          type: string
        timestamp:
          type: string
          format: date-time
    PagedResponseVisitSummaryDto:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/VisitSummaryDto"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        last:
          type: boolean
    VisitSummaryDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        eventDateTime:
          type: string
          format: date-time
        title:
          type: string
        status:
          type: string
          enum:
          - SCHEDULED
          - COMPLETED
          - CANCELLED
        durationMinutes:
          type: integer
          format: int32
        summaryNotes:
          type: string
    ApiResponseVisitDetailDto:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/VisitDetailDto"
        message:
          type: string
        timestamp:
          type: string
          format: date-time
    VisitDetailDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        eventDateTime:
          type: string
          format: date-time
        title:
          type: string
        status:
          type: string
          enum:
          - SCHEDULED
          - COMPLETED
          - CANCELLED
        durationMinutes:
          type: integer
          format: int32
        summaryNotes:
          type: string
        description:
          type: string
        peso:
          type: number
          format: double
        estatura:
          type: number
          format: double
        imc:
          type: number
          format: double
        indiceGrasaCorporal:
          type: number
          format: double
        nivelPeso:
          type: string
          enum:
