# Default test database — applies to @DataJpaTest slices and @SpringBootTest without an explicit profile.
spring.datasource.url=jdbc:h2:mem:testdb-${random.uuid};MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS public\\;SET SCHEMA public
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-test-master.yaml
spring.session.store-type=none
nutriconsultas.seed.platillos.enabled=false
nutriconsultas.seed.template-dietas.enabled=false
