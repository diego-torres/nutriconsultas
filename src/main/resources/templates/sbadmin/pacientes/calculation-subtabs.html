<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <style th:fragment="calculationSubTabsStyle">
    /* Sub-pestañas de cálculo: barra tipo segmented control (sb-admin-2) */
    .calc-subtab-bar {
      background-color: #eaecf4;
      border: 1px solid #d1d3e2;
      border-radius: 0.35rem;
      padding: 0.35rem;
    }

    #calculationSubTabsContent > .tab-pane {
      display: none;
    }

    #calculationSubTabsContent > .tab-pane.active {
      display: block;
    }

    #calculationSubTabs.calc-subtab-nav {
      gap: 0.25rem;
    }

    #calculationSubTabs.calc-subtab-nav .nav-item {
      margin: 0;
    }

    #calculationSubTabs.calc-subtab-nav .calc-subtab-link {
      border: none;
      background-color: transparent;
      color: #5a5c69;
      cursor: pointer;
      font-size: 0.8125rem;
      font-weight: 600;
      line-height: 1.25;
      padding: 0.5rem 0.875rem;
      border-radius: 0.35rem;
      transition: background-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
      white-space: nowrap;
    }

    #calculationSubTabs.calc-subtab-nav .calc-subtab-link i {
      margin-right: 0.35rem;
      opacity: 0.9;
    }

    #calculationSubTabs.calc-subtab-nav .calc-subtab-link:hover,
    #calculationSubTabs.calc-subtab-nav .calc-subtab-link:focus {
      background-color: rgba(255, 255, 255, 0.75);
      color: #3a3b45;
      outline: none;
      text-decoration: none;
    }

    #calculationSubTabs.calc-subtab-nav .calc-subtab-link:focus-visible {
      box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.35);
    }

    #calculationSubTabs.calc-subtab-nav .calc-subtab-link.active,
    #calculationSubTabs.calc-subtab-nav .calc-subtab-link.active:hover,
    #calculationSubTabs.calc-subtab-nav .calc-subtab-link.active:focus {
      background-color: #4e73df;
      color: #fff;
      box-shadow: 0 0.125rem 0.25rem rgba(58, 59, 69, 0.2);
    }

    #calculationSubTabs.calc-subtab-nav .calc-subtab-link.active i {
      opacity: 1;
    }

    @media (max-width: 767.98px) {
      #calculationSubTabs.calc-subtab-nav .calc-subtab-link {
        font-size: 0.75rem;
        padding: 0.45rem 0.65rem;
      }
    }
  </style>

  <div th:fragment="calculationSubTabsNav" class="calc-subtab-bar mb-3">
    <ul class="nav nav-pills flex-wrap calc-subtab-nav mb-0" id="calculationSubTabs" role="tablist">
      <li class="nav-item">
        <button type="button" class="nav-link calc-subtab-link active" id="calc-ideal-weight-subtab"
                data-calc-target="calc-ideal-weight" role="tab"
                aria-controls="calc-ideal-weight" aria-selected="true">
          <i class="fas fa-weight"></i> Peso Teórico
        </button>
      </li>
      <li class="nav-item">
        <button type="button" class="nav-link calc-subtab-link" id="calc-bmi-subtab"
                data-calc-target="calc-bmi" role="tab"
                aria-controls="calc-bmi" aria-selected="false">
          <i class="fas fa-chart-line"></i> IMC
        </button>
      </li>
      <li class="nav-item">
        <button type="button" class="nav-link calc-subtab-link" id="calc-bmr-subtab"
                data-calc-target="calc-bmr" role="tab"
                aria-controls="calc-bmr" aria-selected="false">
          <i class="fas fa-fire"></i> TMB
        </button>
      </li>
      <li class="nav-item">
        <button type="button" class="nav-link calc-subtab-link" id="calc-get-subtab"
                data-calc-target="calc-get" role="tab"
                aria-controls="calc-get" aria-selected="false">
          <i class="fas fa-bolt"></i> GET
        </button>
      </li>
      <li class="nav-item">
        <button type="button" class="nav-link calc-subtab-link" id="calc-tbw-subtab"
                data-calc-target="calc-tbw" role="tab"
                aria-controls="calc-tbw" aria-selected="false">
          <i class="fas fa-tint"></i> Agua Corporal
        </button>
      </li>
      <li class="nav-item">
        <button type="button" class="nav-link calc-subtab-link" id="calc-body-comp-subtab"
                data-calc-target="calc-body-comp" role="tab"
                aria-controls="calc-body-comp" aria-selected="false">
          <i class="fas fa-percentage"></i> Composición
        </button>
      </li>
    </ul>
  </div>
</body>
</html>
