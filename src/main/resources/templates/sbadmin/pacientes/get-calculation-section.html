<div th:fragment="getCalculationSection">
  <div class="row mb-4">
    <div class="col-md-12">
      <div class="card border-left-warning">
        <div class="card-body">
          <p class="text-muted small mb-3">
            GET = TMB × factor de actividad. Escala del paciente:
            <strong th:text="${paciente.activityFactorScale != null ? paciente.activityFactorScale.displayName : 'Harris-Benedict'}">Harris-Benedict</strong>
          </p>
          <div class="row">
            <div class="col-md-4">
              <div class="form-group">
                <label class="small">Fórmula TMB:</label>
                <select class="form-control form-control-sm" id="get-bmr-formula" th:field="*{bmrFormula}">
                  <option value="">Usar preferencia del paciente</option>
                  <option th:each="formula : ${T(com.nutriconsultas.paciente.calculation.BmrFormulaType).values()}"
                          th:value="${formula.name()}" th:text="${formula.displayName}"></option>
                </select>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-group">
                <label class="small">Nivel de actividad física:</label>
                <select class="form-control form-control-sm" id="get-activity-level" th:field="*{physicalActivityLevel}">
                  <option value="">Seleccione...</option>
                  <option th:each="level : ${T(com.nutriconsultas.paciente.calculation.PhysicalActivityLevel).values()}"
                          th:if="${level.name() != 'CUSTOM'}"
                          th:value="${level.name()}" th:text="${level.displayName}"></option>
                  <option value="CUSTOM">Personalizado (factor libre)</option>
                </select>
              </div>
            </div>
            <div class="col-md-4" id="get-custom-factor-group" style="display:none;">
              <div class="form-group">
                <label class="small">Factor personalizado:</label>
                <input type="number" step="0.001" min="1" max="5" class="form-control form-control-sm"
                       id="get-custom-factor" th:field="*{activityFactor}" placeholder="Ej: 1.45">
              </div>
            </div>
          </div>
          <div class="row mt-2">
            <div class="col-md-4">
              <div class="alert alert-light mb-0 py-2">
                <strong>TMB:</strong> <span id="get-bmr-used-result" class="text-primary">-</span> <small>kcal/día</small>
              </div>
            </div>
            <div class="col-md-4">
              <div class="alert alert-light mb-0 py-2">
                <strong>Factor:</strong> <span id="get-factor-result" class="text-primary">-</span>
              </div>
            </div>
            <div class="col-md-4">
              <div class="alert alert-warning mb-0 py-2">
                <strong>GET:</strong> <span id="get-result" class="text-dark font-weight-bold">-</span> <small>kcal/día</small>
              </div>
            </div>
          </div>
          <input type="hidden" id="get-bmr-used-hidden" th:field="*{bmrUsed}">
          <input type="hidden" id="get-kcal-hidden" th:field="*{getKcal}">
        </div>
      </div>
    </div>
  </div>
</div>

<div th:fragment="energyPreferencesSection">
  <hr>
  <h5 class="mb-3"><i class="fas fa-sliders-h"></i> Preferencias Energéticas</h5>
  <p class="text-muted small">Se aplican por paciente al calcular GET en antropométricos y consultas.</p>
  <div class="form-group">
    <label>Escala de factores de actividad</label>
    <select class="form-control" th:field="*{activityFactorScale}" id="activityFactorScaleSelect">
      <option th:each="scale : ${T(com.nutriconsultas.paciente.calculation.ActivityFactorScale).values()}"
              th:value="${scale.name()}" th:text="${scale.displayName}"></option>
    </select>
  </div>
  <div class="form-group">
    <label>Fórmula TMB preferida</label>
    <select class="form-control" th:field="*{preferredBmrFormula}">
      <option th:each="formula : ${T(com.nutriconsultas.paciente.calculation.BmrFormulaType).values()}"
              th:value="${formula.name()}" th:text="${formula.displayName}"></option>
    </select>
  </div>
  <div id="customFactorsSection">
    <label>Factores personalizados (solo escala Personalizado)</label>
    <div class="row">
      <div class="col-md-4 form-group">
        <label class="small">Sedentario</label>
        <input type="number" step="0.001" min="1" max="5" class="form-control" th:field="*{customFactorSedentary}">
      </div>
      <div class="col-md-4 form-group">
        <label class="small">Ligera</label>
        <input type="number" step="0.001" min="1" max="5" class="form-control" th:field="*{customFactorLight}">
      </div>
      <div class="col-md-4 form-group">
        <label class="small">Moderada</label>
        <input type="number" step="0.001" min="1" max="5" class="form-control" th:field="*{customFactorModerate}">
      </div>
      <div class="col-md-4 form-group">
        <label class="small">Intensa</label>
        <input type="number" step="0.001" min="1" max="5" class="form-control" th:field="*{customFactorIntense}">
      </div>
      <div class="col-md-4 form-group">
        <label class="small">Muy intensa</label>
        <input type="number" step="0.001" min="1" max="5" class="form-control" th:field="*{customFactorVeryIntense}">
      </div>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const scaleSelect = document.getElementById('activityFactorScaleSelect');
      const customSection = document.getElementById('customFactorsSection');
      function toggleCustom() {
        if (scaleSelect && customSection) {
          customSection.style.display = scaleSelect.value === 'CUSTOM' ? '' : 'none';
        }
      }
      if (scaleSelect) {
        scaleSelect.addEventListener('change', toggleCustom);
        toggleCustom();
      }
    });
  </script>
</div>
