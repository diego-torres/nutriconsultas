<div th:fragment="calculationScript(enableSync)">
  <!-- Calculation Tab JavaScript -->
  <script>
    // Get patient data from Thymeleaf
    const patientAge = [[${patientAge != null ? patientAge : 'null'}]];
    const patientIsMale = [[${patientIsMale != null ? patientIsMale : 'false'}]];
    const patientActivityScale = '[[${paciente != null && paciente.activityFactorScale != null ? paciente.activityFactorScale.name() : "HARRIS_BENEDICT"}]]';
    const patientPreferredBmrFormula = '[[${paciente != null && paciente.preferredBmrFormula != null ? paciente.preferredBmrFormula.name() : "PROMEDIO"}]]';
    const patientCustomFactors = {
      sedentary: [[${paciente != null && paciente.customFactorSedentary != null ? paciente.customFactorSedentary : 'null'}]],
      light: [[${paciente != null && paciente.customFactorLight != null ? paciente.customFactorLight : 'null'}]],
      moderate: [[${paciente != null && paciente.customFactorModerate != null ? paciente.customFactorModerate : 'null'}]],
      intense: [[${paciente != null && paciente.customFactorIntense != null ? paciente.customFactorIntense : 'null'}]],
      veryIntense: [[${paciente != null && paciente.customFactorVeryIntense != null ? paciente.customFactorVeryIntense : 'null'}]]
    };
    const patientTefMethod = '[[${paciente != null && paciente.tefMethod != null ? paciente.tefMethod.name() : "FIXED"}]]';
    const patientTefBase = '[[${paciente != null && paciente.tefBase != null ? paciente.tefBase.name() : "GET"}]]';
    const patientTefFixedPercent = [[${paciente != null && paciente.tefFixedPercent != null ? paciente.tefFixedPercent : 10.0}]];
    const patientTefMacroProtein = [[${paciente != null && paciente.tefMacroProteinPercent != null ? paciente.tefMacroProteinPercent : 'null'}]];
    const patientTefMacroCarbs = [[${paciente != null && paciente.tefMacroCarbsPercent != null ? paciente.tefMacroCarbsPercent : 'null'}]];
    const patientTefMacroFat = [[${paciente != null && paciente.tefMacroFatPercent != null ? paciente.tefMacroFatPercent : 'null'}]];
    const patientStressActive = [[${paciente != null && paciente.physiologicalStressActive != null ? paciente.physiologicalStressActive : false}]];
    const patientStressType = '[[${paciente != null && paciente.physiologicalStressType != null ? paciente.physiologicalStressType.name() : ""}]]';
    const patientStressFormula = '[[${paciente != null && paciente.stressFormulaTable != null ? paciente.stressFormulaTable.name() : "LONG"}]]';
    const patientStressIncrementMode = '[[${paciente != null && paciente.stressIncrementMode != null ? paciente.stressIncrementMode.name() : "MULTIPLIER_BMR"}]]';
    const patientStressFactorValue = [[${paciente != null && paciente.stressFactorValue != null ? paciente.stressFactorValue : 'null'}]];
    const patientStressFeverTemperature = [[${paciente != null && paciente.stressFeverTemperature != null ? paciente.stressFeverTemperature : 'null'}]];
    const calculationEnableSync = [[${enableSync}]];

    function getCalcSubTabPanes(tabContent) {
      return Array.prototype.filter.call(tabContent.children, function(child) {
        return child.classList && child.classList.contains('tab-pane');
      });
    }

    function refreshAllCalculationPanels() {
      if (calculationEnableSync) {
        syncFromBodyMassTab();
      } else {
        updateBmiCalculations();
        updateBmrCalculations();
        updateGetCalculations();
        updateIdealWeightCalculations();
        updateTotalBodyWaterCalculations();
        updateBodyCompositionCalculations();
        updateSomatotypeCalculations();
      }
    }

    function showCalculationSubTab(targetId) {
      const tabList = document.getElementById('calculationSubTabs');
      const tabContent = document.getElementById('calculationSubTabsContent');
      if (!tabList || !tabContent || !targetId) {
        return;
      }
      const paneId = targetId.charAt(0) === '#' ? targetId.substring(1) : targetId;
      tabList.querySelectorAll('.calc-subtab-link').forEach(function(link) {
        link.classList.remove('active');
        link.setAttribute('aria-selected', 'false');
      });
      getCalcSubTabPanes(tabContent).forEach(function(pane) {
        pane.classList.remove('show', 'active');
      });
      const link = tabList.querySelector('[data-calc-target="' + paneId + '"]');
      const pane = document.getElementById(paneId);
      if (link) {
        link.classList.add('active');
        link.setAttribute('aria-selected', 'true');
      }
      if (pane) {
        pane.classList.add('active', 'show');
      }
      refreshAllCalculationPanels();
    }
    window.showCalculationSubTab = showCalculationSubTab;

    // BMI Calculation Functions
    function calculateClassicBmi(weight, height) {
      if (!weight || !height || weight <= 0 || height <= 0) {
        return null;
      }
      return weight / (height * height);
    }

    function calculateTrefethenBmi(weight, height) {
      if (!weight || !height || weight <= 0 || height <= 0) {
        return null;
      }
      return 1.3 * weight / Math.pow(height, 2.5);
    }

    // BMR Calculation Functions
    function calculateMifflinStJeorBmr(weight, height, age, isMale) {
      if (!weight || !height || !age || weight <= 0 || height <= 0 || age <= 0) {
        return null;
      }
      const heightCm = height * 100;
      return 10 * weight + 6.25 * heightCm - 5 * age + (isMale ? 5 : -161);
    }

    function calculateHarrisBenedictBmr(weight, height, age, isMale) {
      if (!weight || !height || !age || weight <= 0 || height <= 0 || age <= 0) {
        return null;
      }
      const heightCm = height * 100;
      if (isMale) {
        return 13.397 * weight + 4.799 * heightCm - 5.677 * age + 88.362;
      } else {
        return 9.247 * weight + 3.098 * heightCm - 4.330 * age + 447.593;
      }
    }

    function calculateKatchMcArdleBmr(leanBodyMass) {
      if (!leanBodyMass || leanBodyMass <= 0) {
        return null;
      }
      return 370 + (21.6 * leanBodyMass);
    }

    function calculateCunninghamBmr(leanBodyMass) {
      if (!leanBodyMass || leanBodyMass <= 0) {
        return null;
      }
      return 500 + (22 * leanBodyMass);
    }

    function calculateFaoWhoOnuBmr(weight, age, isMale) {
      if (!weight || !age || weight <= 0 || age < 18) {
        return null;
      }
      if (isMale) {
        if (age >= 18 && age < 30) {
          return 15.3 * weight + 679;
        } else if (age >= 30 && age < 60) {
          return 11.6 * weight + 879;
        } else {
          return 13.5 * weight + 487;
        }
      } else {
        if (age >= 18 && age < 30) {
          return 14.7 * weight + 496;
        } else if (age >= 30 && age < 60) {
          return 8.7 * weight + 829;
        } else {
          return 10.5 * weight + 596;
        }
      }
    }

    function calculateValenciaBmr(weight, height, age, isMale) {
      if (!weight || !height || !age || weight <= 0 || height <= 0 || age <= 0) {
        return null;
      }
      const heightCm = height * 100;
      if (isMale) {
        return 11.0 * weight + 16.0 * heightCm - 2.7 * age + 545;
      } else {
        return 8.0 * weight + 12.0 * heightCm - 2.5 * age + 447;
      }
    }

    function calculatePromedioBmr(weight, height, age, isMale) {
      if (!weight || !height || !age || weight <= 0 || height <= 0 || age <= 0) {
        return null;
      }
      const mifflinStJeor = calculateMifflinStJeorBmr(weight, height, age, isMale);
      const harrisBenedict = calculateHarrisBenedictBmr(weight, height, age, isMale);
      const faoWhoOnu = calculateFaoWhoOnuBmr(weight, age, isMale);
      const valencia = calculateValenciaBmr(weight, height, age, isMale);
      
      let validCount = 0;
      let sum = 0;
      
      if (mifflinStJeor !== null) {
        sum += mifflinStJeor;
        validCount++;
      }
      if (harrisBenedict !== null) {
        sum += harrisBenedict;
        validCount++;
      }
      if (faoWhoOnu !== null) {
        sum += faoWhoOnu;
        validCount++;
      }
      if (valencia !== null) {
        sum += valencia;
        validCount++;
      }
      
      if (validCount === 0) {
        return null;
      }
      
      return sum / validCount;
    }

    const ACTIVITY_FACTORS = {
      HARRIS_BENEDICT: { SEDENTARY: 1.2, LIGHT: 1.375, MODERATE: 1.55, INTENSE: 1.725, VERY_INTENSE: 1.9 },
      FAO_WHO: { SEDENTARY: 1.53, LIGHT: 1.76, MODERATE: 2.10, INTENSE: 2.40, VERY_INTENSE: 2.80 },
      OMS: { SEDENTARY: 1.40, LIGHT: 1.60, MODERATE: 1.80, INTENSE: 2.00, VERY_INTENSE: 2.20 }
    };

    const STRESS_LONG_FACTORS = {
      MINOR_SURGERY: 1.10, MAJOR_SURGERY: 1.20, MODERATE_INFECTION: 1.20, SEVERE_INFECTION: 1.40,
      SEPSIS: 1.50, TRAUMA: 1.35, BURNS: 1.50, CANCER: 1.25, FRACTURE: 1.20, POST_OPERATIVE: 1.15,
      MULTIPLE_TRAUMA: 1.50, HEAD_INJURY: 1.40, ORGAN_FAILURE: 1.50, PREGNANCY_COMPLICATION: 1.20,
      COPD_EXACERBATION: 1.20
    };

    const STRESS_ASPEN_FACTORS = {
      MINOR_SURGERY: 1.10, MAJOR_SURGERY: 1.25, MODERATE_INFECTION: 1.30, SEVERE_INFECTION: 1.55,
      SEPSIS: 1.60, TRAUMA: 1.40, BURNS: 1.80, CANCER: 1.30, FRACTURE: 1.20, POST_OPERATIVE: 1.15,
      MULTIPLE_TRAUMA: 1.60, HEAD_INJURY: 1.45, ORGAN_FAILURE: 1.55, PREGNANCY_COMPLICATION: 1.25,
      COPD_EXACERBATION: 1.25
    };

    function resolveStressCatalogFactor(formula, stressType) {
      if (!stressType) return null;
      if (formula === 'ASPEN') return STRESS_ASPEN_FACTORS[stressType] || null;
      return STRESS_LONG_FACTORS[stressType] || null;
    }

    function readStressCalculationInputs() {
      const activeEl = document.getElementById('calcPhysiologicalStressActive');
      const active = activeEl ? activeEl.checked : patientStressActive;
      const typeEl = document.getElementById('calcStressType');
      const formulaEl = document.getElementById('calcStressFormula');
      const modeEl = document.getElementById('calcStressIncrementMode');
      const factorEl = document.getElementById('calcStressFactorValue');
      const feverEl = document.getElementById('calcStressFeverTemperature');
      return {
        active: active,
        stressType: (typeEl && typeEl.value) ? typeEl.value : patientStressType,
        formula: (formulaEl && formulaEl.value) ? formulaEl.value : patientStressFormula,
        incrementMode: (modeEl && modeEl.value) ? modeEl.value : patientStressIncrementMode,
        factorValue: factorEl && factorEl.value ? parseFloat(factorEl.value) : patientStressFactorValue,
        feverTemperature: feverEl && feverEl.value ? parseFloat(feverEl.value) : patientStressFeverTemperature
      };
    }

    function calculateStressKcal(bmr, getValue, stressConfig) {
      if (!stressConfig.active || !stressConfig.stressType || stressConfig.stressType === 'NONE') {
        return null;
      }
      const formula = stressConfig.formula || 'LONG';
      const mode = stressConfig.incrementMode || 'MULTIPLIER_BMR';
      if (formula === 'FEVER_PER_DEGREE' && stressConfig.stressType === 'FEVER') {
        const temp = stressConfig.feverTemperature;
        if (!bmr || !temp || temp <= 37) return null;
        return bmr * 0.13 * (temp - 37);
      }
      if (mode === 'FIXED_KCAL') {
        return stressConfig.factorValue > 0 ? stressConfig.factorValue : null;
      }
      const multiplier = stressConfig.factorValue > 0
        ? stressConfig.factorValue
        : resolveStressCatalogFactor(formula, stressConfig.stressType);
      if (!multiplier || multiplier <= 1) return null;
      if (mode === 'MULTIPLIER_GET') {
        return getValue ? getValue * (multiplier - 1) : null;
      }
      return bmr ? bmr * (multiplier - 1) : null;
    }

    function resolveActivityFactor(scale, level, customFactorValue) {
      if (!level) return null;
      if (level === 'CUSTOM') {
        return customFactorValue && customFactorValue > 0 ? customFactorValue : null;
      }
      if (scale === 'CUSTOM') {
        const map = {
          SEDENTARY: patientCustomFactors.sedentary,
          LIGHT: patientCustomFactors.light,
          MODERATE: patientCustomFactors.moderate,
          INTENSE: patientCustomFactors.intense,
          VERY_INTENSE: patientCustomFactors.veryIntense
        };
        return map[level] || null;
      }
      const factors = ACTIVITY_FACTORS[scale] || ACTIVITY_FACTORS.HARRIS_BENEDICT;
      return factors[level] || null;
    }

    function calculateBmrByFormula(formula, weight, height, age, isMale) {
      const f = formula || patientPreferredBmrFormula;
      switch (f) {
        case 'MIFFLIN_ST_JEOR': return calculateMifflinStJeorBmr(weight, height, age, isMale);
        case 'HARRIS_BENEDICT': return calculateHarrisBenedictBmr(weight, height, age, isMale);
        case 'FAO_WHO_ONU': return calculateFaoWhoOnuBmr(weight, age, isMale);
        case 'VALENCIA': return calculateValenciaBmr(weight, height, age, isMale);
        case 'PROMEDIO':
        default: return calculatePromedioBmr(weight, height, age, isMale);
      }
    }

    function calculateTef(bmr, getValue) {
      if (!getValue) {
        return null;
      }
      if (patientTefMethod === 'MACRONUTRIENTS') {
        const protein = patientTefMacroProtein != null ? patientTefMacroProtein : 30;
        const carbs = patientTefMacroCarbs != null ? patientTefMacroCarbs : 50;
        const fat = patientTefMacroFat != null ? patientTefMacroFat : 20;
        const sum = protein + carbs + fat;
        if (sum <= 0) {
          return null;
        }
        const weighted = (protein / sum) * 0.25 + (carbs / sum) * 0.075 + (fat / sum) * 0.02;
        return getValue * weighted;
      }
      const percent = patientTefFixedPercent > 0 ? patientTefFixedPercent : 10;
      const base = patientTefBase === 'BMR' ? bmr : getValue;
      if (!base) {
        return null;
      }
      return base * (percent / 100);
    }

    function updateGetCalculations() {
      const formulaEl = document.getElementById('get-bmr-formula');
      const levelEl = document.getElementById('get-activity-level');
      const customGroup = document.getElementById('get-custom-factor-group');
      const customFactorEl = document.getElementById('get-custom-factor');
      if (!formulaEl || !levelEl) return;

      const level = levelEl.value;
      if (customGroup) {
        customGroup.style.display = level === 'CUSTOM' ? '' : 'none';
      }

      const weight = parseFloat(document.getElementById('bmr-weight-prom')?.value || document.getElementById('calc-weight')?.value);
      const height = parseFloat(document.getElementById('bmr-height-prom')?.value || document.getElementById('calc-height')?.value);
      const age = parseInt(document.getElementById('bmr-age-prom')?.value) || patientAge;
      const formula = formulaEl.value || patientPreferredBmrFormula;
      const customFactor = customFactorEl ? parseFloat(customFactorEl.value) : null;

      const bmr = calculateBmrByFormula(formula, weight, height, age, patientIsMale);
      const factor = resolveActivityFactor(patientActivityScale, level, customFactor);
      const getValue = bmr && factor ? bmr * factor : null;
      const activityKcal = bmr && getValue ? getValue - bmr : null;
      const tefValue = calculateTef(bmr, getValue);
      const totalValue = getValue != null ? getValue + (tefValue || 0) : null;
      const stressValue = calculateStressKcal(bmr, getValue, readStressCalculationInputs());
      const finalValue = totalValue != null ? totalValue + (stressValue || 0) : null;

      const bmrResult = document.getElementById('get-bmr-used-result');
      const activityResult = document.getElementById('get-activity-kcal-result');
      const factorResult = document.getElementById('get-factor-result');
      const getResult = document.getElementById('get-result');
      const tefResult = document.getElementById('get-tef-result');
      const totalResult = document.getElementById('get-total-result');
      const stressResult = document.getElementById('get-stress-result');
      const finalResult = document.getElementById('get-final-result');
      const bmrHidden = document.getElementById('get-bmr-used-hidden');
      const getHidden = document.getElementById('get-kcal-hidden');
      const tefHidden = document.getElementById('get-tef-hidden');
      const totalHidden = document.getElementById('get-total-hidden');
      const stressHidden = document.getElementById('get-stress-hidden');
      const finalHidden = document.getElementById('get-final-hidden');

      if (bmrResult) bmrResult.textContent = formatEnergyKcal(bmr);
      if (activityResult) activityResult.textContent = formatEnergyKcal(activityKcal);
      if (factorResult) factorResult.textContent = factor ? factor.toFixed(3) : '-';
      if (getResult) getResult.textContent = formatEnergyKcal(getValue);
      if (tefResult) tefResult.textContent = formatEnergyKcal(tefValue);
      if (totalResult) totalResult.textContent = formatEnergyKcal(totalValue);
      if (stressResult) stressResult.textContent = formatEnergyKcal(stressValue);
      if (finalResult) finalResult.textContent = formatEnergyKcal(finalValue);
      if (bmrHidden && bmr) bmrHidden.value = bmr.toFixed(2);
      if (getHidden && getValue) getHidden.value = getValue.toFixed(2);
      if (tefHidden && tefValue) tefHidden.value = tefValue.toFixed(2);
      if (totalHidden && totalValue) totalHidden.value = totalValue.toFixed(2);
      if (stressHidden && stressValue) stressHidden.value = stressValue.toFixed(2);
      if (finalHidden && finalValue) finalHidden.value = finalValue.toFixed(2);
    }

    function toggleStressCalculationFields() {
      const activeEl = document.getElementById('calcPhysiologicalStressActive');
      const fields = document.getElementById('stressCalculationFields');
      if (activeEl && fields) {
        fields.style.display = activeEl.checked ? '' : 'none';
      }
    }

    // Ideal Weight Calculation Functions
    const INCHES_PER_METER = 39.3701;

    function calculateRobinsonIdealWeight(height, isMale) {
      if (!height || height <= 0 || isMale === null || isMale === undefined) {
        return null;
      }
      const heightInches = height * INCHES_PER_METER;
      if (isMale) {
        return 52 + 1.9 * (heightInches - 60);
      } else {
        return 49 + 1.7 * (heightInches - 60);
      }
    }

    function calculateMetropolitanIdealWeight(height, isMale) {
      if (!height || height <= 0 || isMale === null || isMale === undefined) {
        return null;
      }
      const heightInches = height * INCHES_PER_METER;
      if (isMale) {
        return 50.0 + 2.3 * (heightInches - 60);
      } else {
        return 45.5 + 2.3 * (heightInches - 60);
      }
    }

    function calculateHamwiIdealWeight(height, isMale) {
      if (!height || height <= 0 || isMale === null || isMale === undefined) {
        return null;
      }
      const heightInches = height * INCHES_PER_METER;
      if (isMale) {
        return 48.0 + 2.7 * (heightInches - 60);
      } else {
        return 45.5 + 2.2 * (heightInches - 60);
      }
    }

    function calculateLorentzIdealWeight(height, isMale) {
      if (!height || height <= 0 || isMale === null || isMale === undefined) {
        return null;
      }
      const heightCm = height * 100;
      if (isMale) {
        return (heightCm - 100) - ((heightCm - 150) / 4);
      } else {
        return (heightCm - 100) - ((heightCm - 150) / 2);
      }
    }

    function calculateTraditionalIdealWeight(height) {
      if (!height || height <= 0) {
        return null;
      }
      const heightCm = height * 100;
      return heightCm - 100;
    }

    // Total Body Water Calculation Functions
    function calculateWatsonTbw(weight, height, age, isMale) {
      if (!weight || !height || isMale === null || isMale === undefined || weight <= 0 || height <= 0) {
        return null;
      }
      if (isMale && (!age || age <= 0)) {
        return null;
      }
      const heightCm = height * 100;
      if (isMale) {
        return 2.447 - (0.09156 * age) + (0.1074 * heightCm) + (0.3362 * weight);
      } else {
        return -2.097 + (0.1069 * heightCm) + (0.2466 * weight);
      }
    }

    function calculateHumeMeyersTbw(weight, height, isMale) {
      if (!weight || !height || isMale === null || isMale === undefined || weight <= 0 || height <= 0) {
        return null;
      }
      const heightCm = height * 100;
      if (isMale) {
        return (0.194786 * heightCm) + (0.296785 * weight) - 14.012934;
      } else {
        return (0.344547 * heightCm) + (0.183809 * weight) - 35.270121;
      }
    }

    // Format number to 2 decimal places
    function formatNumber(value) {
      if (value === null || value === undefined || isNaN(value)) {
        return '-';
      }
      return value.toFixed(2);
    }

    // Energy values (kcal) with thousands separator — matches Thymeleaf COMMA grouping
    function formatEnergyKcal(value) {
      if (value === null || value === undefined || isNaN(value)) {
        return '-';
      }
      return Math.round(value).toLocaleString('es-MX', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      });
    }

    // Calculate Nivel de Peso from BMI
    function calculateNivelPeso(bmi) {
      if (bmi === null || bmi === undefined || isNaN(bmi)) {
        return null;
      }
      if (bmi > 30.0) {
        return 'SOBREPESO';
      }
      if (bmi > 25.0) {
        return 'ALTO';
      }
      if (bmi > 18.5) {
        return 'NORMAL';
      }
      return 'BAJO';
    }

    // Update BMI calculations
    function updateBmiCalculations() {
      const calcWeightEl = document.getElementById('calc-weight');
      const calcHeightEl = document.getElementById('calc-height');
      if (!calcWeightEl || !calcHeightEl) {
        return;
      }
      // Classic BMI
      const weight1 = parseFloat(calcWeightEl.value);
      const height1 = parseFloat(calcHeightEl.value);
      const classicBmi = calculateClassicBmi(weight1, height1);
      const classicBmiResult = document.getElementById('classic-bmi-result');
      if (classicBmiResult) {
        classicBmiResult.textContent = formatNumber(classicBmi);
      }
      
      // Auto-populate body composition BMI if classic BMI is calculated
      const bodyCompBmiField = document.getElementById('body-comp-bmi');
      if (bodyCompBmiField && classicBmi !== null) {
        bodyCompBmiField.value = classicBmi.toFixed(2);
        updateBodyCompositionCalculations();
      }
      updateSomatotypeCalculations();

      // Update Masa Corporal (same as weight)
      const bodyMassValueElement = document.getElementById('body-mass-value-result');
      if (bodyMassValueElement) {
        bodyMassValueElement.textContent = formatNumber(weight1);
      }

      // Update Nivel de Peso
      const nivelPeso = calculateNivelPeso(classicBmi);
      const nivelPesoElement = document.getElementById('nivel-peso-result');
      if (nivelPesoElement) {
        nivelPesoElement.textContent = nivelPeso !== null ? nivelPeso : '-';
      }

      // Update IMC (same as BMI)
      const imcElement = document.getElementById('imc-result');
      if (imcElement) {
        imcElement.textContent = formatNumber(classicBmi);
      }

      // Update Índice de Grasa Corporal (from body composition calculation)
      // This will be updated when body composition calculations run
      updateIndiceGrasaCorporal();

      // Trefethen BMI
      const weightTrefethenEl = document.getElementById('calc-weight-trefethen');
      const heightTrefethenEl = document.getElementById('calc-height-trefethen');
      if (weightTrefethenEl && heightTrefethenEl) {
        const weight2 = parseFloat(weightTrefethenEl.value);
        const height2 = parseFloat(heightTrefethenEl.value);
        const trefethenBmi = calculateTrefethenBmi(weight2, height2);
        const trefethenBmiResult = document.getElementById('trefethen-bmi-result');
        if (trefethenBmiResult) {
          trefethenBmiResult.textContent = formatNumber(trefethenBmi);
        }
      }
    }

    // Update BMR calculations
    function updateBmrCalculations() {
      // Mifflin-St Jeor
      const weightMsj = parseFloat(document.getElementById('bmr-weight-msj').value);
      const heightMsj = parseFloat(document.getElementById('bmr-height-msj').value);
      const ageMsj = parseInt(document.getElementById('bmr-age-msj').value) || patientAge;
      const msjBmr = calculateMifflinStJeorBmr(weightMsj, heightMsj, ageMsj, patientIsMale);
      document.getElementById('msj-bmr-result').textContent = formatNumber(msjBmr);

      // Harris-Benedict
      const weightHb = parseFloat(document.getElementById('bmr-weight-hb').value);
      const heightHb = parseFloat(document.getElementById('bmr-height-hb').value);
      const ageHb = parseInt(document.getElementById('bmr-age-hb').value) || patientAge;
      const hbBmr = calculateHarrisBenedictBmr(weightHb, heightHb, ageHb, patientIsMale);
      document.getElementById('hb-bmr-result').textContent = formatNumber(hbBmr);

      // Katch-McArdle

    // Body Composition Calculation Functions
    function calculateBodyFatPercentage(bmi, age, isMale) {
      if (!bmi || !age || isMale === null || isMale === undefined || bmi <= 0 || age <= 0) {
        return null;
      }
      // Deurenberg formula: BF% = (1.20 × BMI) + (0.23 × Age) - (10.8 × gender) - 5.4
      // gender: 1 for male, 0 for female
      const genderFactor = isMale ? 1 : 0;
      const bodyFatPercentage = (1.20 * bmi) + (0.23 * age) - (10.8 * genderFactor) - 5.4;
      // Clamp to reasonable range (5% to 50%)
      return Math.max(5.0, Math.min(50.0, bodyFatPercentage));
    }

    function calculateMuscleMassPercentage(bodyFatPercentage, bonePercentage, waterPercentage) {
      if (bodyFatPercentage === null || bodyFatPercentage === undefined) {
        return null;
      }
      let muscleMassPercentage;
      if (bonePercentage !== null && bonePercentage !== undefined && waterPercentage !== null && waterPercentage !== undefined) {
        muscleMassPercentage = 100 - bodyFatPercentage - bonePercentage - waterPercentage;
      } else if (bonePercentage !== null && bonePercentage !== undefined) {
        muscleMassPercentage = 100 - bodyFatPercentage - bonePercentage;
      } else {
        muscleMassPercentage = 100 - bodyFatPercentage;
      }
      return Math.max(20.0, Math.min(80.0, muscleMassPercentage));
    }

    function resolveBonePercentageForCalculation() {
      const bioBonePctField = document.querySelector('input[name*="bioimpedance.boneMassPercentage"]');
      if (bioBonePctField && bioBonePctField.value) {
        return parseFloat(bioBonePctField.value);
      }
      const manualBonePctField = document.querySelector('input[name*="bodyComposition.porcentajeMasaOsea"]');
      if (manualBonePctField && manualBonePctField.value) {
        return parseFloat(manualBonePctField.value);
      }
      const bioBoneKgField = document.querySelector('input[name*="bioimpedance.boneMass"]');
      const manualBoneKgField = document.querySelector('input[name*="bodyComposition.masaOseaKg"]');
      const weightField = document.querySelector('input[name*="bodyMass.weight"]');
      const boneKg = (bioBoneKgField && bioBoneKgField.value) ? parseFloat(bioBoneKgField.value)
        : ((manualBoneKgField && manualBoneKgField.value) ? parseFloat(manualBoneKgField.value) : null);
      const weight = (weightField && weightField.value) ? parseFloat(weightField.value) : null;
      if (boneKg !== null && weight !== null && weight > 0) {
        return (boneKg / weight) * 100;
      }
      return null;
    }

    function resolveWaterPercentageForCalculation() {
      const waterPctField = document.querySelector('input[name*="bioimpedance.totalBodyWaterPercentage"]');
      if (waterPctField && waterPctField.value) {
        return parseFloat(waterPctField.value);
      }
      return null;
    }

    const SOMATOTYPE_MIN_ADULT_AGE = 18;

    function parseMeasurementInput(selector) {
      const field = document.querySelector(selector);
      if (!field || field.value === '' || field.value == null) {
        return null;
      }
      const value = parseFloat(field.value);
      return Number.isFinite(value) ? value : null;
    }

    function clampSomatotypeRating(value) {
      return value <= 0 ? 0.1 : value;
    }

    function calculateHeathCarterEndomorphy(triceps, subscapular, supraspinal, heightCm) {
      const sum = triceps + subscapular + supraspinal;
      const x = sum * (170.18 / heightCm);
      return -0.7182 + 0.1451 * x - 0.00068 * x * x + 0.0000014 * x * x * x;
    }

    function calculateHeathCarterMesomorphy(correctedArm, correctedCalf, humerus, femur, heightCm) {
      return 0.858 * humerus + 0.601 * femur + 0.188 * correctedArm
        + 0.161 * correctedCalf - 0.131 * heightCm + 4.5;
    }

    function calculateHeathCarterEctomorphy(heightCm, weightKg) {
      const hwr = heightCm / Math.cbrt(weightKg);
      if (hwr >= 40.75) {
        return 0.732 * hwr - 28.58;
      }
      if (hwr > 38.25) {
        return 0.463 * hwr - 17.63;
      }
      return 0.1;
    }

    function collectSomatotypeMissingMeasurements(weight, height, triceps, subscapular, supraspinal,
        flexedArm, calf, medialCalf, humerus, femur) {
      const missing = [];
      if (!weight || weight <= 0) { missing.push('Peso'); }
      if (!height || height <= 0) { missing.push('Estatura'); }
      if (triceps == null) { missing.push('Pliegue tríceps'); }
      if (subscapular == null) { missing.push('Pliegue subescapular'); }
      if (supraspinal == null) { missing.push('Pliegue supraespinal'); }
      if (flexedArm == null) { missing.push('Perímetro brazo contraído'); }
      if (calf == null) { missing.push('Perímetro pantorrilla'); }
      if (medialCalf == null) { missing.push('Pliegue pantorrilla medial'); }
      if (humerus == null) { missing.push('Diámetro húmero'); }
      if (femur == null) { missing.push('Diámetro fémur'); }
      return missing;
    }

    function updateSomatotypeChart(endomorphy, mesomorphy, ectomorphy) {
      const pointGroup = document.getElementById('somatotype-chart-point');
      const circle = document.getElementById('somatotype-chart-circle');
      const label = document.getElementById('somatotype-chart-label');
      if (!pointGroup || !circle || !label) {
        return;
      }
      if (endomorphy == null || mesomorphy == null || ectomorphy == null) {
        pointGroup.style.display = 'none';
        return;
      }
      const chartX = ectomorphy - endomorphy;
      const chartY = 2 * mesomorphy - (ectomorphy + endomorphy);
      const plotX = 110 + chartX * 7;
      const plotY = 185 - chartY * 7;
      circle.setAttribute('cx', plotX);
      circle.setAttribute('cy', plotY);
      label.setAttribute('x', plotX + 8);
      label.setAttribute('y', plotY + 4);
      label.textContent = endomorphy.toFixed(1) + '-' + mesomorphy.toFixed(1) + '-' + ectomorphy.toFixed(1);
      pointGroup.style.display = '';
    }

    function updateSomatotypeCalculations() {
      const endoEl = document.getElementById('somatotype-endo-result');
      if (!endoEl) {
        return;
      }

      const pediatricAlert = document.getElementById('somatotype-pediatric-alert');
      const missingAlert = document.getElementById('somatotype-missing-alert');
      const missingList = document.getElementById('somatotype-missing-list');

      if (patientAge != null && patientAge < SOMATOTYPE_MIN_ADULT_AGE) {
        endoEl.textContent = '-';
        document.getElementById('somatotype-meso-result').textContent = '-';
        document.getElementById('somatotype-ecto-result').textContent = '-';
        if (pediatricAlert) { pediatricAlert.classList.remove('d-none'); }
        if (missingAlert) { missingAlert.classList.add('d-none'); }
        updateSomatotypeChart(null, null, null);
        return;
      }
      if (pediatricAlert) { pediatricAlert.classList.add('d-none'); }

      const weight = parseMeasurementInput('input[name*="bodyMass.weight"]');
      const height = parseMeasurementInput('input[name*="bodyMass.height"]');
      const triceps = parseMeasurementInput('input[name*="skinfolds.tricepsSkinfold"]');
      const subscapular = parseMeasurementInput('input[name*="skinfolds.subscapularSkinfold"]');
      const supraspinal = parseMeasurementInput('input[name*="skinfolds.supraespinalSkinfold"]');
      const flexedArm = parseMeasurementInput('input[name*="circumferences.midUpperArmCircumferenceContracted"]');
      const calf = parseMeasurementInput('input[name*="circumferences.calfCircumference"]');
      const medialCalf = parseMeasurementInput('input[name*="skinfolds.medialCalfSkinfold"]');
      const humerus = parseMeasurementInput('input[name*="diameters.humerusDiameter"]');
      const femur = parseMeasurementInput('input[name*="diameters.femurDiameter"]');

      const missing = collectSomatotypeMissingMeasurements(weight, height, triceps, subscapular, supraspinal,
        flexedArm, calf, medialCalf, humerus, femur);

      if (missing.length > 0) {
        endoEl.textContent = '-';
        document.getElementById('somatotype-meso-result').textContent = '-';
        document.getElementById('somatotype-ecto-result').textContent = '-';
        if (missingAlert && missingList) {
          missingList.textContent = missing.join(', ');
          missingAlert.classList.remove('d-none');
        }
        updateSomatotypeChart(null, null, null);
        return;
      }

      if (missingAlert) { missingAlert.classList.add('d-none'); }

      const heightCm = height * 100;
      const endomorphy = clampSomatotypeRating(
        calculateHeathCarterEndomorphy(triceps, subscapular, supraspinal, heightCm));
      const correctedArm = flexedArm - triceps / 10;
      const correctedCalf = calf - medialCalf / 10;
      const mesomorphy = clampSomatotypeRating(
        calculateHeathCarterMesomorphy(correctedArm, correctedCalf, humerus, femur, heightCm));
      const ectomorphy = clampSomatotypeRating(calculateHeathCarterEctomorphy(heightCm, weight));

      endoEl.textContent = endomorphy.toFixed(1);
      document.getElementById('somatotype-meso-result').textContent = mesomorphy.toFixed(1);
      document.getElementById('somatotype-ecto-result').textContent = ectomorphy.toFixed(1);
      updateSomatotypeChart(endomorphy, mesomorphy, ectomorphy);
    }

      }

      // Initial calculation if values are already present
      updateBmiCalculations();
      updateBmrCalculations();
      updateGetCalculations();
      updateIdealWeightCalculations();
      updateTotalBodyWaterCalculations();
      updateBodyCompositionCalculations();
      updateSomatotypeCalculations();
      attachSomatotypeInputListeners();
      toggleStressCalculationFields();
      updateGetCalculations();
    });

    document.addEventListener('click', function(e) {
      const trigger = e.target.closest('#calculationSubTabs .calc-subtab-link[data-calc-target]');
      if (!trigger) {
        return;
      }
      e.preventDefault();
      e.stopPropagation();
      showCalculationSubTab(trigger.getAttribute('data-calc-target'));
    }, true);
  </script>
</div>
