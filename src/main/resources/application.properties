server.port=3000
server.error.include-stacktrace=always
# Platillo/profile image uploads (#275); nginx allows up to 50M
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
# Trust X-Forwarded-* from nginx (HTTP + HTTPS termination, OAuth redirect URLs).
server.forward-headers-strategy=framework

# Mobile API JSON: ISO-8601 dates, omit null fields on mobile DTO records (#110)
spring.jackson.serialization.write-dates-as-timestamps=false

spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}

logging.level.com.axis.scm=DEBUG
maps.api.key=${MAPS_KEY}
amazon.s3.bucket=${AWS_BUCKET}
amazon.s3.key=${AWS_KEY}
amazon.s3.secret=${AWS_SECRET}
amazon.s3.region=us-east-1

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
#spring.jpa.show-sql=true

#spring session
spring.h2.console.enabled=true

spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
# Auth0 properties
spring.security.oauth2.client.registration.auth0.scope=openid,profile,email
spring.security.oauth2.client.registration.auth0.client-id=${AUTH_CLIENT}
spring.security.oauth2.client.registration.auth0.client-secret=${AUTH_SECRET}
spring.security.oauth2.client.provider.auth0.issuer-uri=${AUTH_ISSUER}
# Patient mobile API — JWT resource server (separate from nutritionist oauth2Login session)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH_ISSUER}
app.security.jwt.audience=${AUTH_AUDIENCE}
# OpenAPI / Swagger UI — disabled in production; enable locally via SPRINGDOC_* env vars (#112)
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
springdoc.swagger-ui.urls-primary-name=mobile
springdoc.packages-to-scan=com.nutriconsultas.mobile
springdoc.paths-to-match=/rest/mobile/**
# Patient write rate limits (#113)
resilience4j.ratelimiter.instances.patientMessages.limit-for-period=10
resilience4j.ratelimiter.instances.patientMessages.limit-refresh-period=1m
resilience4j.ratelimiter.instances.patientMessages.timeout-duration=0s
# Auth0 Management API — optional; enables patient mobile linkage by email (#109)
app.auth0.management.client-id=${AUTH0_MGMT_CLIENT_ID:}
app.auth0.management.client-secret=${AUTH0_MGMT_CLIENT_SECRET:}
app.auth0.management.domain=${AUTH0_MGMT_DOMAIN:${AUTH_ISSUER}}
# reCAPTCHA configuration
recaptcha.site-key=${RECAPTCHA_SITE_KEY:6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI}
recaptcha.secret-key=${RECAPTCHA_SECRET_KEY}
# Platform administrators (Auth0 sub claims or OAuth login emails, comma-separated)
nutriconsultas.platform.admin-user-ids=${PLATFORM_ADMIN_USER_IDS:}
nutriconsultas.platform.admin-emails=${PLATFORM_ADMIN_EMAILS:}
# Subscription payment provider (#189)
nutriconsultas.subscription.payment.provider=${PAYMENT_PROVIDER:mercadopago}
nutriconsultas.subscription.payment.webhook-secret=${PAYMENT_WEBHOOK_SECRET:}
nutriconsultas.subscription.payment.mercadopago-access-token=${MERCADOPAGO_ACCESS_TOKEN:}
nutriconsultas.subscription.payment.mercadopago-back-url=${MERCADOPAGO_BACK_URL:https://minutriporcion.com/admin}
nutriconsultas.subscription.payment.currency=${PAYMENT_CURRENCY:MXN}
nutriconsultas.subscription.payment.stub-simulate-checkout=${PAYMENT_STUB_SIMULATE_CHECKOUT:true}
nutriconsultas.subscription.invitation.expiry-days=${SUBSCRIPTION_INVITATION_EXPIRY_DAYS:7}
# Production EC2: set APP_BASE_URL in app.env (Terraform user_data or ssm-remediate-app-host.sh).
nutriconsultas.subscription.invitation.base-url=${APP_BASE_URL:http://localhost:3000}
nutriconsultas.patient.invitation.expiry-days=${PATIENT_INVITATION_EXPIRY_DAYS:14}
nutriconsultas.patient.invitation.human-code-prefix=NUTRI
# TODO: move PATIENT_INVITATION_JWS_SECRET to GCP Secret Manager in production
nutriconsultas.patient.invitation.jws-secret=${PATIENT_INVITATION_JWS_SECRET:}
nutriconsultas.subscription.default-grace-period-days=${SUBSCRIPTION_GRACE_PERIOD_DAYS:7}
nutriconsultas.subscription.expiry-reminder-days=7,3,1
nutriconsultas.subscription.lifecycle-job-enabled=${SUBSCRIPTION_LIFECYCLE_JOB_ENABLED:true}
nutriconsultas.subscription.lifecycle-job-cron=${SUBSCRIPTION_LIFECYCLE_JOB_CRON:0 0 6 * * *}
#logging.level.org.hibernate.SQL=debug
#logging.level.org.hibernate.type.descriptor.sql=trace