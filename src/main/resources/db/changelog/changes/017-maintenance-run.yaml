databaseChangeLog:
  - changeSet:
      id: 017-maintenance-run-table
      author: nutriconsultas
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: maintenance_run
      changes:
        - createTable:
            tableName: maintenance_run
            columns:
              - column:
                  name: run_id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: started_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: completed_at
                  type: TIMESTAMP
              - column:
                  name: actor_user_id
                  type: VARCHAR(255)
              - column:
                  name: eligible_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: purged_user_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: s3_backup_key
                  type: VARCHAR(512)
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: error_summary
                  type: VARCHAR(500)
        - createIndex:
            indexName: idx_maintenance_run_started_at
            tableName: maintenance_run
            columns:
              - column:
                  name: started_at
  - changeSet:
      id: 017-subscription-tenant-purged-at
      author: nutriconsultas
      preConditions:
        - onFail: MARK_RAN
        - not:
            columnExists:
              tableName: subscription
              columnName: tenant_purged_at
      changes:
        - addColumn:
            tableName: subscription
            columns:
              - column:
                  name: tenant_purged_at
                  type: TIMESTAMP
