databaseChangeLog:
  - changeSet:
      id: 024-ai-chat-thread-table
      author: nutriconsultas
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: ai_chat_thread
      changes:
        - createTable:
            tableName: ai_chat_thread
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nutritionist_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: clinic_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: ai_chat_thread
            baseColumnNames: patient_id
            referencedTableName: paciente
            referencedColumnNames: id
            constraintName: fk_ai_chat_thread_paciente
            onDelete: SET NULL
        - createIndex:
            indexName: idx_ai_chat_thread_nutritionist_id
            tableName: ai_chat_thread
            columns:
              - column:
                  name: nutritionist_id
        - createIndex:
            indexName: idx_ai_chat_thread_patient_id
            tableName: ai_chat_thread
            columns:
              - column:
                  name: patient_id
  - changeSet:
      id: 024-ai-chat-message-table
      author: nutriconsultas
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: ai_chat_message
      changes:
        - createTable:
            tableName: ai_chat_message
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: thread_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: CLOB
                  constraints:
                    nullable: false
              - column:
                  name: tool_name
                  type: VARCHAR(120)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: ai_chat_message
            baseColumnNames: thread_id
            referencedTableName: ai_chat_thread
            referencedColumnNames: id
            constraintName: fk_ai_chat_message_thread
            onDelete: CASCADE
        - createIndex:
            indexName: idx_ai_chat_message_thread_id
            tableName: ai_chat_message
            columns:
              - column:
                  name: thread_id
  - changeSet:
      id: 024-ai-generated-draft-table
      author: nutriconsultas
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: ai_generated_draft
      changes:
        - createTable:
            tableName: ai_generated_draft
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: thread_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: draft_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: json_payload
                  type: CLOB
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: accepted_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: ai_generated_draft
            baseColumnNames: thread_id
            referencedTableName: ai_chat_thread
            referencedColumnNames: id
            constraintName: fk_ai_generated_draft_thread
            onDelete: CASCADE
        - createIndex:
            indexName: idx_ai_generated_draft_thread_id
            tableName: ai_generated_draft
            columns:
              - column:
                  name: thread_id
